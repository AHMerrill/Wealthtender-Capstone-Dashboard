services:
  # ---- FastAPI backend ----
  - type: web
    name: wt-api
    runtime: docker
    dockerfilePath: ./Dockerfile.api
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: "10000"
      - key: API_KEY
        sync: false  # set the same value on both services via Render dashboard

  # ---- Dash frontend ----
  - type: web
    name: wt-dash
    runtime: docker
    dockerfilePath: ./Dockerfile.dashboard
    plan: free
    envVars:
      - key: API_BASE
        value: "https://wt-api-hdji.onrender.com"
      - key: API_KEY
        sync: false  # must match the API service's API_KEY
      - key: ADMIN_PASSWORD
        sync: false  # set manually in Render dashboard — don't commit secrets
